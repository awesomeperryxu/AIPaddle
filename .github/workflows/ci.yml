name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── 机密文件守卫（独立必需检查，2026-07-21）──
  # 设为分支保护必需检查后：任何分支不 rebase 到含此 job 的 main，就产生不了
  # confidential-guard 状态 → 永远无法合并，被迫先 rebase（拿到干净 main + 守卫）。
  # 修复被拦截：对机密文件执行 `git rm --cached`（本地保留）后再提交。
  confidential-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 机密文件守卫
        run: |
          CONFIDENTIAL=$(git ls-files -- \
            docs/requirements docs/visily docs/design docs/templates docs/adr _legacy \
            docs/IMPLEMENTATION_AUDIT.md docs/PARALLEL_EXECUTION_PLAN.md ROADMAP.md docs/ISSUES.md \
            'docs/*.docx' 'docs/AIPaddle-*.xlsx' 'docs/~$*')
          if [ -n "$CONFIDENTIAL" ]; then
            echo "::error::检测到机密文档被重新跟踪，禁止合并到公开仓库。请对以下文件执行 git rm --cached（本地保留）后再提交："
            echo "$CONFIDENTIAL"
            exit 1
          fi
          echo "✅ 无机密文档回流"

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      # ── ROADMAP 0.9b：单元/集成测试（L2/L3）──
      - name: Unit & integration tests
        run: pnpm test

  # e2e:
