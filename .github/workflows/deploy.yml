name: Deploy

# 0.8 自动化部署：push main → SSH 到服务器拉取最新 main、构建、PM2 重启，再冒烟检查
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# 同一时间只允许一个生产部署，避免多次 push 并发部署互相干扰
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 准备部署密钥
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: SSH 部署到服务器
        env:
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 \
            ubuntu@43.173.99.218 "GH_PAT='${GH_PAT}' bash -s" <<'REMOTE'
          set -euo pipefail
          cd /opt/aipaddle
          export PATH="$HOME/.local/share/pnpm:$PATH"

          # 保留 .env（密钥只存服务器，不进 GitHub）
          cp -f .env /tmp/aipaddle.env.bak 2>/dev/null || true

          # 用 Actions 临时 token 拉取私有仓库最新 main（一次性 URL，不写入 remote）
          git fetch "https://x-access-token:${GH_PAT}@github.com/HELLOPERRYXU/AIPaddle.git" main
          git reset --hard FETCH_HEAD

          # 恢复/校验 .env
          [ -f .env ] || cp -f /tmp/aipaddle.env.bak .env 2>/dev/null || true
          [ -f .env ] || { echo "FATAL: /opt/aipaddle/.env 缺失，终止部署"; exit 1; }

          pnpm install --frozen-lockfile
          rm -rf .next
          # build 失败则不重启（PM2 继续跑旧版本），部署整体失败
          pnpm build
          pm2 restart aipaddle --update-env
          pm2 save
          echo "部署完成: $(git log --oneline -1)"
          REMOTE

      - name: 冒烟检查（https://aipaddle.net/login 期望 200）
        run: |
          for i in 1 2 3 4 5 6; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://aipaddle.net/login || true)
            if [ "$code" = "200" ]; then echo "冒烟通过 (HTTP $code)"; exit 0; fi
            echo "第 $i 次: HTTP $code，10s 后重试…"; sleep 10
          done
          echo "冒烟失败：/login 未返回 200"; exit 1
