<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="./licon.js"></script>
<style>
  body{margin:0;background:oklch(0.1 0.01 250);color:oklch(0.95 0.005 260);font-family:'Geist',-apple-system,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;color-scheme:dark}
  a{color:oklch(0.65 0.2 250);text-decoration:none} a:hover{color:oklch(0.75 0.16 250)}
  l-icon{display:inline-flex;flex:none;line-height:0} l-icon svg{width:100%;height:100%}
  input,button{font-family:inherit}
  input::placeholder{color:oklch(0.6 0.01 260 / 0.7)}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:oklch(0.28 0.015 250);border-radius:5px;border:2px solid oklch(0.1 0.01 250)}
  [data-dacard][data-active="1"]{box-shadow:0 0 0 2px oklch(0.65 0.2 250),0 4px 12px rgba(0,0,0,.3) !important}
</style>
</helmet>
<div data-screen-label="数字员工" style="display:flex;gap:20px;height:calc(100vh - 88px)">
  <div style="display:flex;flex-direction:column;min-width:0;width:{{ leftWidth }};flex:{{ leftFlex }}">
    <div style="margin-bottom:16px;flex:none">
      <h1 style="margin:0;font-size:20px;font-weight:600;color:oklch(0.95 0.005 260)">数字员工</h1>
      <p style="margin:2px 0 0;font-size:14px;color:oklch(0.6 0.01 260)">选择一个 Agent 开始对话</p>
    </div>
    <div style="position:relative;margin-bottom:16px;flex:none">
      <l-icon name="search" style="width:16px;height:16px;color:oklch(0.6 0.01 260);position:absolute;left:12px;top:50%;transform:translateY(-50%)"></l-icon>
      <input placeholder="搜索 Agent..." value="{{ search }}" onInput="{{ setSearch }}" style="width:100%;height:36px;font-size:14px;background:oklch(0.14 0.015 250);border:1px solid oklch(0.25 0.015 250);border-radius:8px;padding:0 12px 0 36px;color:oklch(0.95 0.005 260);outline:none" style-focus="border-color:oklch(0.65 0.2 250)">
    </div>
    <sc-if value="{{ noSel }}" hint-placeholder-val="{{ true }}">
      <div style="margin-bottom:16px;flex:none">
        <p style="margin:0 0 8px;font-size:12px;font-weight:500;color:oklch(0.6 0.01 260);text-transform:uppercase;letter-spacing:0.08em">最近使用</p>
        <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:4px">
          <sc-for list="{{ recent }}" as="r" hint-placeholder-count="3">
            <button onClick="{{ r.select }}" style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;background:oklch(0.14 0.015 250);border:1px solid oklch(0.25 0.015 250);cursor:pointer;flex:none" style-hover="border-color:oklch(0.65 0.2 250 / 0.5)"><span style="font-size:16px">{{ r.avatar }}</span><span style="font-size:14px;color:oklch(0.95 0.005 260)">{{ r.name }}</span></button>
          </sc-for>
        </div>
      </div>
    </sc-if>
    <div style="flex:1;overflow-y:auto;min-height:0;display:{{ gridDisplay }};grid-template-columns:{{ gridCols }};gap:{{ gridGap }};align-content:start;flex-direction:column">
      <sc-for list="{{ list }}" as="a" hint-placeholder-count="4">
        <div data-dacard="1" data-active="{{ a.activeAttr }}" onClick="{{ a.select }}" style="background:oklch(0.14 0.015 250);border:1px solid oklch(0.25 0.015 250);border-radius:12px;padding:{{ cardPad }};cursor:pointer;transition:box-shadow .15s" style-hover="box-shadow:0 4px 12px rgba(0,0,0,.3)">
          <div style="display:flex;align-items:flex-start;gap:12px">
            <div style="width:{{ avSize }};height:{{ avSize }};border-radius:12px;background:linear-gradient(135deg,oklch(0.65 0.2 250 / 0.2),oklch(0.55 0.18 180 / 0.2));display:flex;align-items:center;justify-content:center;font-size:{{ avFont }};flex:none">{{ a.avatar }}</div>
            <div style="flex:1;min-width:0">
              <h3 style="margin:0 0 2px;font-size:{{ nameFont }};font-weight:500;color:oklch(0.95 0.005 260);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ a.name }}</h3>
              <p style="margin:0;font-size:{{ descFont }};color:oklch(0.6 0.01 260);overflow:hidden;display:-webkit-box;-webkit-line-clamp:{{ descLines }};-webkit-box-orient:vertical">{{ a.description }}</p>
              <sc-if value="{{ noSel }}" hint-placeholder-val="{{ true }}">
                <div style="display:flex;align-items:center;gap:12px;margin-top:8px;font-size:12px;color:oklch(0.6 0.01 260)">
                  <span style="font-size:10px;padding:1px 6px;height:16px;display:inline-flex;align-items:center;border:1px solid oklch(0.25 0.015 250);border-radius:999px;color:oklch(0.95 0.005 260)">{{ a.department }}</span>
                  <span style="display:flex;align-items:center;gap:4px"><l-icon name="message-square" style="width:12px;height:12px"></l-icon>{{ a.callsFmt }}</span>
                </div>
              </sc-if>
            </div>
            <sc-if value="{{ hasSel }}" hint-placeholder-val="{{ false }}"><l-icon name="chevron-right" style="width:16px;height:16px;color:oklch(0.6 0.01 260);flex:none"></l-icon></sc-if>
          </div>
        </div>
      </sc-for>
    </div>
  </div>
  <sc-if value="{{ hasSel }}" hint-placeholder-val="{{ false }}">
    <div style="flex:1;display:flex;flex-direction:column;background:oklch(0.14 0.015 250);border-radius:12px;border:1px solid oklch(0.25 0.015 250);overflow:hidden;min-width:0">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid oklch(0.25 0.015 250);background:oklch(0.2 0.015 250 / 0.2);flex:none">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,oklch(0.65 0.2 250 / 0.2),oklch(0.55 0.18 180 / 0.2));display:flex;align-items:center;justify-content:center;font-size:16px">{{ sel.avatar }}</div>
          <div>
            <h2 style="margin:0;font-size:14px;font-weight:500;color:oklch(0.95 0.005 260)">{{ sel.name }}</h2>
            <div style="display:flex;align-items:center;gap:8px;margin-top:2px">
              <span style="font-size:10px;padding:1px 6px;height:16px;display:inline-flex;align-items:center;border:1px solid oklch(0.25 0.015 250);border-radius:999px;color:oklch(0.95 0.005 260)">{{ sel.department }}</span>
              <span style="font-size:11px;color:oklch(0.6 0.01 260);display:flex;align-items:center;gap:4px"><span style="width:6px;height:6px;border-radius:999px;background:#22c55e"></span>在线</span>
            </div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:4px">
          <button style="height:32px;padding:0 8px;display:flex;align-items:center;gap:6px;font-size:12px;color:oklch(0.95 0.005 260);background:none;border:none;border-radius:6px;cursor:pointer" style-hover="background:oklch(0.2 0.015 250)"><l-icon name="phone" style="width:14px;height:14px"></l-icon>本地CC</button>
          <button style="height:32px;padding:0 8px;display:flex;align-items:center;gap:6px;font-size:12px;color:oklch(0.95 0.005 260);background:none;border:none;border-radius:6px;cursor:pointer" style-hover="background:oklch(0.2 0.015 250)"><l-icon name="messages-square" style="width:14px;height:14px"></l-icon>企微</button>
          <button style="height:32px;padding:0 8px;display:flex;align-items:center;gap:6px;font-size:12px;color:oklch(0.95 0.005 260);background:none;border:none;border-radius:6px;cursor:pointer" style-hover="background:oklch(0.2 0.015 250)"><l-icon name="clock" style="width:14px;height:14px"></l-icon>历史</button>
        </div>
      </div>
      <div style="flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:20px;min-height:0">
        <div style="display:flex;gap:12px">
          <div style="width:32px;height:32px;border-radius:999px;background:linear-gradient(135deg,oklch(0.65 0.2 250 / 0.2),oklch(0.55 0.18 180 / 0.2));display:flex;align-items:center;justify-content:center;font-size:12px;flex:none">{{ sel.avatar }}</div>
          <div style="max-width:75%">
            <div style="padding:14px;border-radius:16px 16px 16px 4px;background:oklch(0.2 0.015 250 / 0.4);border:1px solid oklch(0.25 0.015 250)">
              <p style="margin:0;font-size:14px;color:oklch(0.95 0.005 260);line-height:1.6">你好！我是{{ sel.name }}。{{ sel.description }}<br><br>有什么可以帮助你的吗？</p>
            </div>
            <p style="margin:6px 0 0;font-size:11px;color:oklch(0.6 0.01 260)">刚刚</p>
          </div>
        </div>
        <sc-for list="{{ msgs }}" as="m" hint-placeholder-count="2">
          <div style="display:flex;gap:12px;flex-direction:{{ m.dir }}">
            <div style="width:32px;height:32px;border-radius:999px;background:{{ m.avBg }};color:oklch(0.65 0.2 250);display:flex;align-items:center;justify-content:center;font-size:12px;flex:none">{{ m.av }}</div>
            <div style="max-width:75%;text-align:{{ m.align }}">
              <div style="padding:14px;border-radius:{{ m.radius }};background:{{ m.bubbleBg }};border:{{ m.bubbleBorder }};text-align:left">
                <p style="margin:0;font-size:14px;color:{{ m.textColor }};line-height:1.6;white-space:pre-wrap">{{ m.content }}</p>
              </div>
              <p style="margin:6px 0 0;font-size:11px;color:oklch(0.6 0.01 260)">{{ m.timestamp }}</p>
            </div>
          </div>
        </sc-for>
      </div>
      <div style="padding:16px;border-top:1px solid oklch(0.25 0.015 250);background:oklch(0.2 0.015 250 / 0.1);flex:none">
        <div style="display:flex;align-items:flex-end;gap:8px">
          <div style="flex:1;position:relative">
            <input placeholder="{{ inputPh }}" value="{{ message }}" onInput="{{ setMessage }}" style="width:100%;height:42px;font-size:14px;background:oklch(0.1 0.01 250);border:1px solid oklch(0.25 0.015 250);border-radius:8px;padding:0 40px 0 12px;color:oklch(0.95 0.005 260);outline:none" style-focus="border-color:oklch(0.65 0.2 250)">
            <button style="position:absolute;right:6px;top:50%;transform:translateY(-50%);width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:none;background:none;border-radius:6px;cursor:pointer" style-hover="background:oklch(0.2 0.015 250)"><l-icon name="paperclip" style="width:16px;height:16px;color:oklch(0.6 0.01 260)"></l-icon></button>
          </div>
          <button style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:oklch(0.65 0.2 250);color:oklch(0.98 0 0);border:none;border-radius:8px;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.3)" style-hover="filter:brightness(1.12)"><l-icon name="send" style="width:16px;height:16px"></l-icon></button>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:12px">
          <l-icon name="sparkles" style="width:14px;height:14px;color:oklch(0.6 0.01 260);flex:none"></l-icon>
          <div style="display:flex;gap:6px;overflow-x:auto">
            <sc-for list="{{ suggestions }}" as="s" hint-placeholder-count="4">
              <button onClick="{{ s.use }}" style="flex:none;height:28px;padding:0 10px;font-size:12px;color:oklch(0.95 0.005 260);background:transparent;border:1px solid oklch(0.25 0.015 250);border-radius:6px;cursor:pointer" style-hover="background:oklch(0.2 0.015 250)">{{ s.label }}</button>
            </sc-for>
          </div>
        </div>
      </div>
    </div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { D: null, search: '', selId: null, message: '' };
  componentDidMount() { import('./data.js').then(m => this.setState({ D: m })).catch(e => console.error('data load', e)); }
  renderVals() {
    const D = this.state.D;
    const term = this.state.search.toLowerCase();
    const published = D ? D.agents.filter(a => a.status === 'published') : [];
    const filtered = published.filter(a => a.name.toLowerCase().includes(term) || a.department.toLowerCase().includes(term));
    const sel = published.find(a => a.id === this.state.selId);
    const has = !!sel;
    const msgs = (D && has) ? D.conversations[0].messages.map(m => {
      const user = m.role === 'user';
      return {
        content: m.content, timestamp: m.timestamp,
        dir: user ? 'row-reverse' : 'row',
        align: user ? 'right' : 'left',
        av: user ? '你' : sel.avatar,
        avBg: user ? 'oklch(0.65 0.2 250 / 0.1)' : 'linear-gradient(135deg,oklch(0.65 0.2 250 / 0.2),oklch(0.55 0.18 180 / 0.2))',
        radius: user ? '16px 16px 4px 16px' : '16px 16px 16px 4px',
        bubbleBg: user ? 'oklch(0.65 0.2 250)' : 'oklch(0.2 0.015 250 / 0.4)',
        bubbleBorder: user ? 'none' : '1px solid oklch(0.25 0.015 250)',
        textColor: user ? 'oklch(0.98 0 0)' : 'oklch(0.95 0.005 260)'
      };
    }) : [];
    return {
      search: this.state.search,
      setSearch: (e) => this.setState({ search: e.target.value }),
      noSel: !has, hasSel: has,
      leftWidth: has ? '288px' : 'auto',
      leftFlex: has ? '0 0 auto' : '1',
      gridDisplay: has ? 'flex' : 'grid',
      gridCols: has ? 'none' : 'repeat(3,1fr)',
      gridGap: has ? '8px' : '12px',
      cardPad: has ? '12px' : '16px',
      avSize: has ? '36px' : '44px',
      avFont: has ? '18px' : '20px',
      nameFont: has ? '14px' : '15px',
      descFont: has ? '12px' : '14px',
      descLines: has ? 1 : 2,
      recent: published.slice(0, 3).map(a => ({ avatar: a.avatar, name: a.name, select: () => this.setState({ selId: a.id }) })),
      list: filtered.map(a => Object.assign({}, a, {
        callsFmt: a.calls.toLocaleString('en-US'),
        activeAttr: this.state.selId === a.id ? '1' : '0',
        select: () => this.setState({ selId: a.id })
      })),
      sel: sel || {},
      msgs,
      message: this.state.message,
      setMessage: (e) => this.setState({ message: e.target.value }),
      inputPh: has ? '向 ' + sel.name + ' 提问...' : '输入...',
      suggestions: ['查询订单状态', '投诉处理', '产品咨询', '退款申请'].map(label => ({ label, use: () => this.setState({ message: label }) }))
    };
  }
}
</script>
</body>
</html>
