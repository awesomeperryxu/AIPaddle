<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="./licon.js"></script>
<style>
  body{margin:0;background:oklch(0.1 0.01 250);color:oklch(0.95 0.005 260);font-family:'Geist',-apple-system,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;color-scheme:dark}
  a{color:oklch(0.65 0.2 250);text-decoration:none} a:hover{color:oklch(0.75 0.16 250)}
  l-icon{display:inline-flex;flex:none;line-height:0} l-icon svg{width:100%;height:100%}
  input,button{font-family:inherit}
  input::placeholder{color:oklch(0.6 0.01 260 / 0.7)}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:oklch(0.28 0.015 250);border-radius:5px;border:2px solid oklch(0.1 0.01 250)}
  [data-kbitem][data-active="1"]{border-color:oklch(0.65 0.2 250) !important;background:oklch(0.65 0.2 250 / 0.08) !important}
</style>
</helmet>
<div data-screen-label="知识库问答" style="display:flex;gap:24px;height:calc(100vh - 88px)">
  <div style="width:288px;flex:none;display:flex;flex-direction:column;gap:16px;overflow-y:auto">
    <div>
      <h1 style="margin:0;font-size:20px;font-weight:600;color:oklch(0.95 0.005 260)">知识库问答</h1>
      <p style="margin:2px 0 0;font-size:14px;color:oklch(0.6 0.01 260)">检索测试：查看召回分段与相关性评分</p>
    </div>
    <div>
      <p style="margin:0 0 8px;font-size:12px;font-weight:500;color:oklch(0.6 0.01 260);text-transform:uppercase;letter-spacing:0.08em">选择知识库</p>
      <div style="display:flex;flex-direction:column;gap:8px">
        <sc-for list="{{ kbs }}" as="kb" hint-placeholder-count="5">
          <div data-kbitem="1" data-active="{{ kb.activeAttr }}" onClick="{{ kb.select }}" style="padding:10px 12px;border-radius:8px;border:1px solid oklch(0.25 0.015 250);background:oklch(0.14 0.015 250);cursor:pointer">
            <div style="display:flex;align-items:center;gap:8px"><l-icon name="folder-open" style="width:15px;height:15px;color:oklch(0.65 0.2 250)"></l-icon><span style="font-size:14px;font-weight:500;color:oklch(0.95 0.005 260)">{{ kb.name }}</span></div>
            <p style="margin:4px 0 0;font-size:12px;color:oklch(0.6 0.01 260)">{{ kb.documents }} 文档 · {{ kb.size }}</p>
          </div>
        </sc-for>
      </div>
    </div>
    <div>
      <p style="margin:0 0 8px;font-size:12px;font-weight:500;color:oklch(0.6 0.01 260);text-transform:uppercase;letter-spacing:0.08em">检索设置</p>
      <div style="background:oklch(0.14 0.015 250);border:1px solid oklch(0.25 0.015 250);border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:10px">
        <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:oklch(0.6 0.01 260)">检索模式</span><span style="color:oklch(0.95 0.005 260)">混合检索</span></div>
        <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:oklch(0.6 0.01 260)">Top K</span><span style="color:oklch(0.95 0.005 260)">3</span></div>
        <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:oklch(0.6 0.01 260)">相关性阈值</span><span style="color:oklch(0.95 0.005 260)">0.60</span></div>
        <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:oklch(0.6 0.01 260)">生成模型</span><span style="color:oklch(0.95 0.005 260)">GPT-4-Turbo</span></div>
      </div>
    </div>
    <div>
      <p style="margin:0 0 8px;font-size:12px;font-weight:500;color:oklch(0.6 0.01 260);text-transform:uppercase;letter-spacing:0.08em">最近提问</p>
      <div style="display:flex;flex-direction:column;gap:6px">
        <sc-for list="{{ history }}" as="h" hint-placeholder-count="3">
          <button onClick="{{ h.use }}" style="text-align:left;padding:8px 10px;border-radius:6px;border:none;background:oklch(0.2 0.015 250 / 0.3);cursor:pointer" style-hover="background:oklch(0.2 0.015 250)">
            <span style="display:block;font-size:13px;color:oklch(0.95 0.005 260);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ h.q }}</span>
            <span style="display:block;font-size:11px;color:oklch(0.6 0.01 260);margin-top:2px">{{ h.kb }} · {{ h.time }}</span>
          </button>
        </sc-for>
      </div>
    </div>
  </div>
  <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:16px;overflow-y:auto">
    <div style="background:oklch(0.14 0.015 250);border:1px solid oklch(0.25 0.015 250);border-radius:12px;padding:16px;flex:none">
      <div style="display:flex;gap:8px">
        <div style="flex:1;position:relative">
          <l-icon name="database" style="width:16px;height:16px;color:oklch(0.6 0.01 260);position:absolute;left:12px;top:50%;transform:translateY(-50%)"></l-icon>
          <input placeholder="向「{{ kbName }}」提问，例如：公司的年假政策是怎样的？" value="{{ query }}" onInput="{{ setQuery }}" onKeyDown="{{ keyDown }}" style="width:100%;height:42px;font-size:14px;background:oklch(0.1 0.01 250);border:1px solid oklch(0.25 0.015 250);border-radius:8px;padding:0 12px 0 38px;color:oklch(0.95 0.005 260);outline:none" style-focus="border-color:oklch(0.65 0.2 250)">
        </div>
        <button onClick="{{ ask }}" style="display:inline-flex;align-items:center;gap:8px;height:42px;padding:0 18px;font-size:14px;font-weight:500;background:oklch(0.65 0.2 250);color:oklch(0.98 0 0);border:none;border-radius:8px;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.3)" style-hover="filter:brightness(1.12)"><l-icon name="send" style="width:15px;height:15px"></l-icon>提问</button>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:10px">
        <l-icon name="sparkles" style="width:14px;height:14px;color:oklch(0.6 0.01 260);flex:none"></l-icon>
        <sc-for list="{{ suggestions }}" as="s" hint-placeholder-count="2">
          <button onClick="{{ s.use }}" style="height:26px;padding:0 10px;font-size:12px;color:oklch(0.95 0.005 260);background:transparent;border:1px solid oklch(0.25 0.015 250);border-radius:999px;cursor:pointer" style-hover="background:oklch(0.2 0.015 250)">{{ s.label }}</button>
        </sc-for>
      </div>
    </div>
    <sc-if value="{{ hasResult }}" hint-placeholder-val="{{ false }}">
      <div style="background:oklch(0.14 0.015 250);border:1px solid oklch(0.25 0.015 250);border-radius:12px;padding:20px;flex:none">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <h3 style="margin:0;font-size:14px;font-weight:600;color:oklch(0.95 0.005 260);display:flex;align-items:center;gap:8px"><l-icon name="message-square" style="width:16px;height:16px;color:oklch(0.65 0.2 250)"></l-icon>生成回答</h3>
          <span style="font-size:12px;color:oklch(0.6 0.01 260)">{{ meta }}</span>
        </div>
        <p style="margin:0;font-size:14px;color:oklch(0.95 0.005 260);line-height:1.8;white-space:pre-wrap">{{ answer }}</p>
      </div>
      <div style="background:oklch(0.14 0.015 250);border:1px solid oklch(0.25 0.015 250);border-radius:12px;padding:20px">
        <h3 style="margin:0 0 12px;font-size:14px;font-weight:600;color:oklch(0.95 0.005 260);display:flex;align-items:center;gap:8px"><l-icon name="database" style="width:16px;height:16px;color:oklch(0.55 0.18 180)"></l-icon>召回分段（{{ nChunks }}）</h3>
        <div style="display:flex;flex-direction:column;gap:12px">
          <sc-for list="{{ chunks }}" as="c" hint-placeholder-count="3">
            <div style="padding:14px;border-radius:8px;background:oklch(0.2 0.015 250 / 0.3);border:1px solid oklch(0.25 0.015 250)">
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
                <span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;background:{{ c.scoreBg }};color:{{ c.scoreColor }};flex:none">{{ c.score }}</span>
                <span style="font-size:13px;font-weight:500;color:oklch(0.95 0.005 260)">{{ c.doc }}</span>
                <span style="font-size:12px;color:oklch(0.6 0.01 260)">{{ c.section }}</span>
                <div style="flex:1"></div>
                <div style="width:90px;height:4px;background:oklch(0.2 0.015 250);border-radius:999px;flex:none"><div style="height:100%;width:{{ c.pct }}%;background:{{ c.scoreColor }};border-radius:999px"></div></div>
              </div>
              <p style="margin:0;font-size:13px;color:oklch(0.6 0.01 260);line-height:1.7">{{ c.text }}</p>
            </div>
          </sc-for>
        </div>
      </div>
    </sc-if>
    <sc-if value="{{ empty }}" hint-placeholder-val="{{ true }}">
      <div style="flex:1;display:flex;align-items:center;justify-content:center;min-height:300px">
        <div style="text-align:center">
          <div style="width:64px;height:64px;margin:0 auto 16px;border-radius:16px;background:linear-gradient(135deg,oklch(0.65 0.2 250 / 0.2),oklch(0.55 0.18 180 / 0.2));display:flex;align-items:center;justify-content:center"><l-icon name="database" style="width:28px;height:28px;color:oklch(0.65 0.2 250)"></l-icon></div>
          <h2 style="margin:0;font-size:17px;font-weight:600;color:oklch(0.95 0.005 260)">基于「{{ kbName }}」提问</h2>
          <p style="margin:6px 0 0;font-size:13px;color:oklch(0.6 0.01 260)">回答将附带召回分段与相关性评分，便于验证检索质量</p>
        </div>
      </div>
    </sc-if>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { D: null, D2: null, kbId: 'kb-001', query: '', result: null };
  componentDidMount() { Promise.all([import('./data.js'), import('./data2.js')]).then(([D, D2]) => this.setState({ D, D2 })).catch(e => console.error('data load', e)); }
  ask() {
    const { D2 } = this.state;
    if (!D2) return;
    const q = this.state.query.trim();
    if (!q) return;
    const r = D2.qaSamples[q] || D2.qaSamples.default;
    this.setState({ result: Object.assign({ q }, r) });
  }
  renderVals() {
    const { D, D2 } = this.state;
    const kbs = D ? D.knowledgeBases : [];
    const kb = kbs.find(k => k.id === this.state.kbId) || kbs[0];
    const r = this.state.result;
    return {
      kbs: kbs.map(k => Object.assign({}, k, {
        activeAttr: kb && kb.id === k.id ? '1' : '0',
        select: () => this.setState({ kbId: k.id, result: null })
      })),
      kbName: kb ? kb.name : '',
      history: D2 ? D2.qaHistory.map(h => Object.assign({}, h, { use: () => { this.setState({ query: h.q }, undefined); setTimeout(() => this.ask(), 0); } })) : [],
      suggestions: ['公司的年假政策是怎样的？', '差旅报销需要哪些票据？'].map(label => ({ label, use: () => { this.setState({ query: label }); setTimeout(() => this.ask(), 0); } })),
      query: this.state.query,
      setQuery: (e) => this.setState({ query: e.target.value }),
      keyDown: (e) => { if (e.key === 'Enter') this.ask(); },
      ask: () => this.ask(),
      hasResult: !!r, empty: !r,
      answer: r ? r.answer : '',
      meta: r ? ('耗时 ' + r.latency + ' · ' + r.model + ' · ' + r.mode) : '',
      nChunks: r ? r.chunks.length + ' 条' : '',
      chunks: r ? r.chunks.map(c => ({
        doc: c.doc, section: c.section, text: c.text,
        score: c.score.toFixed(2),
        pct: Math.round(c.score * 100),
        scoreColor: c.score >= 0.85 ? '#22c55e' : c.score >= 0.6 ? '#eab308' : 'oklch(0.55 0.22 25)',
        scoreBg: c.score >= 0.85 ? 'rgba(34,197,94,0.12)' : c.score >= 0.6 ? 'rgba(234,179,8,0.12)' : 'oklch(0.55 0.22 25 / 0.12)'
      })) : []
    };
  }
}
</script>
</body>
</html>
