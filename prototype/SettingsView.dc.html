<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="./licon.js"></script>
<style>
  body{margin:0;background:oklch(0.1 0.01 250);color:oklch(0.95 0.005 260);font-family:'Geist',-apple-system,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;color-scheme:dark}
  a{color:oklch(0.65 0.2 250);text-decoration:none} a:hover{color:oklch(0.75 0.16 250)}
  l-icon{display:inline-flex;flex:none;line-height:0} l-icon svg{width:100%;height:100%}
  input,select,button{font-family:inherit}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:oklch(0.28 0.015 250);border-radius:5px;border:2px solid oklch(0.1 0.01 250)}
  @keyframes omfade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
</style>
</helmet>
<div data-screen-label="系统设置" style="display:flex;flex-direction:column;gap:20px;max-width:880px">
  <sc-if value="{{ toastShow }}" hint-placeholder-val="{{ false }}">
    <div style="position:fixed;bottom:24px;right:24px;z-index:300;background:oklch(0.14 0.015 250);border:1px solid oklch(0.55 0.18 145 / 0.4);border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:8px;box-shadow:0 10px 30px rgba(0,0,0,.5);animation:omfade .2s"><l-icon name="check-circle-2" style="width:16px;height:16px;color:#22c55e"></l-icon><span style="font-size:13px;color:oklch(0.95 0.005 260)">{{ toast }}</span></div>
  </sc-if>
  <div style="display:flex;align-items:center;justify-content:space-between">
    <div>
      <h1 style="margin:0;font-size:20px;font-weight:600;color:oklch(0.95 0.005 260)">系统设置</h1>
      <p style="margin:2px 0 0;font-size:14px;color:oklch(0.6 0.01 260)">平台级全局配置（对所有租户生效）</p>
    </div>
    <button onClick="{{ save }}" style="display:inline-flex;align-items:center;gap:8px;height:36px;padding:0 16px;font-size:14px;font-weight:500;background:oklch(0.65 0.2 250);color:oklch(0.98 0 0);border:none;border-radius:8px;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.3)" style-hover="filter:brightness(1.12)"><l-icon name="save" style="width:15px;height:15px"></l-icon>保存设置</button>
  </div>
  <div style="background:oklch(0.14 0.015 250);border:1px solid oklch(0.25 0.015 250);border-radius:12px;padding:20px">
    <h3 style="margin:0 0 16px;font-size:15px;font-weight:600;color:oklch(0.95 0.005 260);display:flex;align-items:center;gap:8px"><l-icon name="building-2" style="width:16px;height:16px;color:oklch(0.65 0.2 250)"></l-icon>平台信息</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div><label style="font-size:12px;color:oklch(0.6 0.01 260);display:block;margin-bottom:4px">平台名称</label><input value="AIPaddle · AI 业务赋能平台" style="width:100%;height:34px;font-size:13px;background:oklch(0.2 0.015 250 / 0.3);border:1px solid oklch(0.25 0.015 250);border-radius:6px;padding:0 10px;color:oklch(0.95 0.005 260);outline:none;box-sizing:border-box" style-focus="border-color:oklch(0.65 0.2 250)"></div>
      <div><label style="font-size:12px;color:oklch(0.6 0.01 260);display:block;margin-bottom:4px">访问域名</label><input value="https://console.aipaddle.cn" style="width:100%;height:34px;font-size:13px;font-family:'Geist Mono',ui-monospace,monospace;background:oklch(0.2 0.015 250 / 0.3);border:1px solid oklch(0.25 0.015 250);border-radius:6px;padding:0 10px;color:oklch(0.95 0.005 260);outline:none;box-sizing:border-box"></div>
      <div><label style="font-size:12px;color:oklch(0.6 0.01 260);display:block;margin-bottom:4px">默认时区</label><select style="width:100%;height:34px;font-size:13px;background:oklch(0.2 0.015 250 / 0.3);border:1px solid oklch(0.25 0.015 250);border-radius:6px;padding:0 10px;color:oklch(0.95 0.005 260);outline:none"><option>UTC+8 (北京时间)</option><option>UTC+9 (东京时间)</option></select></div>
      <div><label style="font-size:12px;color:oklch(0.6 0.01 260);display:block;margin-bottom:4px">默认语言</label><select style="width:100%;height:34px;font-size:13px;background:oklch(0.2 0.015 250 / 0.3);border:1px solid oklch(0.25 0.015 250);border-radius:6px;padding:0 10px;color:oklch(0.95 0.005 260);outline:none"><option>简体中文</option><option>English</option></select></div>
    </div>
  </div>
  <div style="background:oklch(0.14 0.015 250);border:1px solid oklch(0.25 0.015 250);border-radius:12px;padding:20px">
    <h3 style="margin:0 0 16px;font-size:15px;font-weight:600;color:oklch(0.95 0.005 260);display:flex;align-items:center;gap:8px"><l-icon name="shield" style="width:16px;height:16px;color:oklch(0.65 0.2 250)"></l-icon>安全策略</h3>
    <div style="display:flex;flex-direction:column;gap:12px">
      <sc-for list="{{ secToggles }}" as="t" hint-placeholder-count="4">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:8px;background:oklch(0.2 0.015 250 / 0.3)">
          <div><p style="margin:0;font-size:14px;font-weight:500;color:oklch(0.95 0.005 260)">{{ t.label }}</p><p style="margin:2px 0 0;font-size:12px;color:oklch(0.6 0.01 260)">{{ t.desc }}</p></div>
          <button onClick="{{ t.toggle }}" style="width:36px;height:20px;border-radius:999px;background:{{ t.bg }};border:none;cursor:pointer;position:relative;flex:none;transition:background .15s"><span style="position:absolute;top:2px;left:{{ t.x }};width:16px;height:16px;border-radius:999px;background:#fff;transition:left .15s"></span></button>
        </div>
      </sc-for>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:4px">
        <div><label style="font-size:12px;color:oklch(0.6 0.01 260);display:block;margin-bottom:4px">会话超时</label><select style="width:100%;height:34px;font-size:13px;background:oklch(0.2 0.015 250 / 0.3);border:1px solid oklch(0.25 0.015 250);border-radius:6px;padding:0 10px;color:oklch(0.95 0.005 260);outline:none"><option>8 小时</option><option>30 分钟</option><option>2 小时</option><option>24 小时</option></select></div>
        <div><label style="font-size:12px;color:oklch(0.6 0.01 260);display:block;margin-bottom:4px">登录失败锁定</label><select style="width:100%;height:34px;font-size:13px;background:oklch(0.2 0.015 250 / 0.3);border:1px solid oklch(0.25 0.015 250);border-radius:6px;padding:0 10px;color:oklch(0.95 0.005 260);outline:none"><option>5 次失败锁定 15 分钟</option><option>3 次失败锁定 30 分钟</option><option>不锁定</option></select></div>
      </div>
    </div>
  </div>
  <div style="background:oklch(0.14 0.015 250);border:1px solid oklch(0.25 0.015 250);border-radius:12px;padding:20px">
    <h3 style="margin:0 0 16px;font-size:15px;font-weight:600;color:oklch(0.95 0.005 260);display:flex;align-items:center;gap:8px"><l-icon name="sparkles" style="width:16px;height:16px;color:oklch(0.65 0.2 250)"></l-icon>模型默认参数</h3>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
      <div><label style="font-size:12px;color:oklch(0.6 0.01 260);display:block;margin-bottom:4px">平台默认模型</label><select style="width:100%;height:34px;font-size:13px;background:oklch(0.2 0.015 250 / 0.3);border:1px solid oklch(0.25 0.015 250);border-radius:6px;padding:0 10px;color:oklch(0.95 0.005 260);outline:none"><option>GPT-4-Turbo</option><option>Claude-3-Opus</option><option>Qwen-Max</option></select></div>
      <div><label style="font-size:12px;color:oklch(0.6 0.01 260);display:block;margin-bottom:4px">默认 Temperature</label><input type="number" value="0.7" step="0.1" style="width:100%;height:34px;font-size:13px;background:oklch(0.2 0.015 250 / 0.3);border:1px solid oklch(0.25 0.015 250);border-radius:6px;padding:0 10px;color:oklch(0.95 0.005 260);outline:none;box-sizing:border-box"></div>
      <div><label style="font-size:12px;color:oklch(0.6 0.01 260);display:block;margin-bottom:4px">调用超时（秒）</label><input type="number" value="60" style="width:100%;height:34px;font-size:13px;background:oklch(0.2 0.015 250 / 0.3);border:1px solid oklch(0.25 0.015 250);border-radius:6px;padding:0 10px;color:oklch(0.95 0.005 260);outline:none;box-sizing:border-box"></div>
    </div>
  </div>
  <div style="background:oklch(0.14 0.015 250);border:1px solid oklch(0.25 0.015 250);border-radius:12px;padding:20px">
    <h3 style="margin:0 0 16px;font-size:15px;font-weight:600;color:oklch(0.95 0.005 260);display:flex;align-items:center;gap:8px"><l-icon name="database" style="width:16px;height:16px;color:oklch(0.65 0.2 250)"></l-icon>数据保留与合规</h3>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
      <div><label style="font-size:12px;color:oklch(0.6 0.01 260);display:block;margin-bottom:4px">审计日志保留</label><select style="width:100%;height:34px;font-size:13px;background:oklch(0.2 0.015 250 / 0.3);border:1px solid oklch(0.25 0.015 250);border-radius:6px;padding:0 10px;color:oklch(0.95 0.005 260);outline:none"><option>1 年（默认）</option><option>3 年（企业版）</option><option>7 年（企业版）</option></select></div>
      <div><label style="font-size:12px;color:oklch(0.6 0.01 260);display:block;margin-bottom:4px">对话日志保留</label><select style="width:100%;height:34px;font-size:13px;background:oklch(0.2 0.015 250 / 0.3);border:1px solid oklch(0.25 0.015 250);border-radius:6px;padding:0 10px;color:oklch(0.95 0.005 260);outline:none"><option>90 天</option><option>30 天</option><option>180 天</option></select></div>
      <div><label style="font-size:12px;color:oklch(0.6 0.01 260);display:block;margin-bottom:4px">删除租户数据保留</label><select style="width:100%;height:34px;font-size:13px;background:oklch(0.2 0.015 250 / 0.3);border:1px solid oklch(0.25 0.015 250);border-radius:6px;padding:0 10px;color:oklch(0.95 0.005 260);outline:none"><option>30 天可恢复</option><option>7 天可恢复</option></select></div>
    </div>
    <p style="margin:12px 0 0;font-size:12px;color:oklch(0.6 0.01 260)">审计日志不可篡改、不可删除；导出操作本身亦会被审计。</p>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { toggles: { mfa: true, ipwl: false, mask: true, watermark: false }, toast: '' };
  componentWillUnmount() { clearTimeout(this._tt); }
  renderVals() {
    const defs = [
      ['mfa', '管理员敏感操作二次验证（MFA）', '删除租户、调整配额、吊销 Key 时要求 TOTP 验证'],
      ['ipwl', '平台控制台 IP 白名单', '仅白名单 IP 可访问平台运营后台'],
      ['mask', '日志敏感信息脱敏', '手机号、身份证、银行卡在日志与导出中自动打码'],
      ['watermark', '页面水印', '控制台叠加操作人工号水印，防截图泄露']
    ];
    return {
      secToggles: defs.map(([key, label, desc]) => {
        const on = this.state.toggles[key];
        return {
          label, desc,
          bg: on ? 'oklch(0.65 0.2 250)' : 'oklch(0.28 0.015 250)',
          x: on ? '18px' : '2px',
          toggle: () => this.setState(s => ({ toggles: Object.assign({}, s.toggles, { [key]: !on }) }))
        };
      }),
      save: () => { this.setState({ toast: '系统设置已保存并同步生效' }); clearTimeout(this._tt); this._tt = setTimeout(() => this.setState({ toast: '' }), 2600); },
      toast: this.state.toast, toastShow: !!this.state.toast
    };
  }
}
</script>
</body>
</html>
